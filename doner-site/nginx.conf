server {
    listen 80;
    server_name doner75.ru www.doner75.ru localhost;

    # Настройки для раздачи собранного React-кода из папки
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Если маршрут не найден, перенаправляем на index.html (важно для React Router)
        try_files $uri $uri/ /index.html;
    }

    # Проксирование всех запросов к API на бэкенд
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Проксирование картинок бэкенда
    location /images/ {
        proxy_pass http://backend:3000/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
